<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sermon — Fellowship Church Knoxville Archive</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#08101e;--card:#0d1525;--card-h:#111e32;
      --border:#1e2940;--border-h:#2e3f60;
      --text:#e2e8f0;--muted:#64748b;--dim:#8b9db5;
      --accent:#6366f1;--purple:#8b5cf6;
      --tag-bg:rgba(99,102,241,.1);--tag:#a5b4fc;--tag-b:rgba(99,102,241,.25);
      --r:12px;
    }
    html{font-size:16px}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:860px;margin:0 auto;padding:0 24px}

    .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:36px}
    .topbar__back{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:13px;transition:color .15s}
    .topbar__back:hover{color:var(--text)}
    .topbar__back svg{width:14px;height:14px}
    .topbar__right a{font-size:12px;color:var(--muted);padding:5px 12px;border:1px solid var(--border);border-radius:20px;transition:all .15s}
    .topbar__right a:hover{border-color:var(--accent);color:var(--tag)}

    /* Hero */
    .sermon-hero{margin-bottom:28px}
    .sermon-hero__date{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .sermon-hero__scripture{font-size:clamp(22px,4vw,36px);font-weight:700;color:var(--tag);margin-bottom:8px;line-height:1.1}
    .sermon-hero__title{font-size:clamp(16px,2.5vw,22px);font-weight:600;color:#fff;margin-bottom:10px;line-height:1.3}
    .sermon-hero__meta{font-size:14px;color:var(--muted);margin-bottom:20px}
    .sermon-hero__series{display:inline-block;padding:3px 10px;background:var(--tag-bg);border:1px solid var(--tag-b);border-radius:20px;font-size:12px;color:var(--tag);margin-bottom:16px}

    /* Buttons */
    .btn-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
    .yt-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);border-radius:var(--r);color:#ff7070;font-size:13px;transition:all .15s}
    .yt-btn:hover{background:rgba(255,68,68,.18);border-color:rgba(255,68,68,.5);color:#ff9090}
    .yt-btn svg{width:16px;height:16px}
    .guide-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);border-radius:var(--r);color:var(--tag);font-size:13px;transition:all .15s}
    .guide-btn:hover{background:rgba(99,102,241,.18);border-color:var(--accent);color:#fff}
    .guide-btn svg{width:15px;height:15px}

    /* Summary boxes */
    .summary-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px 26px;margin-bottom:20px}
    .summary-box__label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
    .summary-box__label.official{color:#34d399}
    .summary-box__label.subsplash{color:#f59e0b}
    .summary-body{font-size:15px;color:var(--dim);line-height:1.75}
    .summary-body p{margin-bottom:14px}
    .summary-body p:last-child{margin-bottom:0}
    .summary-muted{font-size:14px;color:var(--muted);font-style:italic}
    .summary-pre{white-space:pre-wrap;font-size:14px;color:var(--dim);line-height:1.7;font-family:inherit}

    /* Topics */
    .topics-section{margin-bottom:28px}
    .topics-section h2{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
    .tags{display:flex;flex-wrap:wrap;gap:8px}
    .tag{padding:5px 12px;background:var(--tag-bg);border:1px solid var(--tag-b);border-radius:20px;font-size:13px;color:var(--tag)}
    .tag a{color:inherit}
    .tag:hover{background:rgba(99,102,241,.2);border-color:var(--accent)}

    /* YouTube description */
    .desc-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 22px;margin-bottom:20px}
    .desc-box__label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
    .desc-box__text{font-size:14px;color:var(--dim);line-height:1.7;white-space:pre-wrap}
    .desc-box__text.collapsed{max-height:120px;overflow:hidden;position:relative}
    .desc-box__text.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,var(--card))}
    .show-more-btn{background:none;border:none;color:var(--tag);font-size:12px;cursor:pointer;margin-top:8px;padding:0}
    .show-more-btn:hover{color:#fff}

    /* Loading */
    .loading{display:flex;align-items:center;justify-content:center;padding:100px 0;color:var(--muted)}
    .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Footer */
    .footer{margin-top:48px;padding:22px 0;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:13px;flex-wrap:wrap;gap:12px}
    .footer a{color:var(--muted);transition:color .15s}
    .footer a:hover{color:var(--text)}

    @media(max-width:640px){.btn-row{flex-direction:column}}
  </style>
</head>
<body>
<div class="wrap">
  <nav class="topbar">
    <a href="/fellowshipchurch" class="topbar__back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Official Archive
    </a>
    <div class="topbar__right"><a href="https://fellowshipknox.org/sermons" target="_blank" rel="noopener">Official Sermons &#8599;</a></div>
  </nav>

  <div id="content"><div class="loading"><div class="spinner"></div>Loading...</div></div>

  <footer class="footer">
    <span>&copy; 2025 forage.life &mdash; Data from Fellowship Church Knoxville official Subsplash feed</span>
    <a href="/fellowshipchurch">&#8592; Back to archive</a>
  </footer>
</div>
<script>
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(d){if(!d)return'';const[y,m,dd]=d.split('-');return new Date(+y,+m-1,+dd).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}

function parseParagraphs(text){
  if(!text)return'';
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split(/\n{2,}/);
  return lines.map(function(block){
    const t=block.trim();
    if(!t)return'';
    return'<p>'+esc(t)+'</p>';
  }).join('');
}

function isUnavailable(text){
  return !text||(text.toLowerCase().includes('not available')||text.toLowerCase().includes('unavailable'));
}

function render(s){
  const ytBtn=s.youtubeUrl?'<a class="yt-btn" href="'+esc(s.youtubeUrl)+'" target="_blank" rel="noopener">'+
    '<svg viewBox="0 0 24 24" fill="#ff4444"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>'+
    'Watch on YouTube</a>':'';

  const guideBtn=s.studyGuideUrl?'<a class="guide-btn" href="'+esc(s.studyGuideUrl)+'" target="_blank" rel="noopener">'+
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+
    'Study Guide (PDF)</a>':'';

  const seriesTag=s.series?'<span class="sermon-hero__series">'+esc(s.series)+'</span>':'';

  // Official summary section
  let officialSummaryHtml='';
  if(s.officialSummary&&s.officialSummary.trim()){
    const parsed=parseParagraphs(s.officialSummary);
    officialSummaryHtml='<div class="summary-box">'+
      '<div class="summary-box__label official">Fellowship\'s Official Summary</div>'+
      '<div class="summary-body">'+parsed+'</div>'+
    '</div>';
  }

  // Subsplash study guide text section
  let studyGuideTextHtml='';
  if(s.studyGuideText&&s.studyGuideText.trim()){
    const unavail=isUnavailable(s.studyGuideText);
    if(unavail){
      studyGuideTextHtml='<div class="summary-box">'+
        '<div class="summary-box__label subsplash">Fellowship\'s Subsplash Summary</div>'+
        '<div class="summary-muted">Not available for this sermon.</div>'+
      '</div>';
    }else{
      const parsed=parseParagraphs(s.studyGuideText);
      studyGuideTextHtml='<div class="summary-box">'+
        '<div class="summary-box__label subsplash">Fellowship\'s Subsplash Summary</div>'+
        '<div class="summary-body">'+parsed+'</div>'+
      '</div>';
    }
  }

  // YouTube description — collapsible if long
  let descHtml='';
  if(s.youtubeDescription&&s.youtubeDescription.trim()){
    const isLong=s.youtubeDescription.length>400;
    const textId='desc-text-'+Math.random().toString(36).substr(2,6);
    descHtml='<div class="desc-box">'+
      '<div class="desc-box__label"><span>YouTube Description</span></div>'+
      '<div class="desc-box__text'+(isLong?' collapsed':'')+'" id="'+textId+'">'+esc(s.youtubeDescription)+'</div>'+
      (isLong?'<button class="show-more-btn" onclick="toggleDesc(\''+textId+'\',this)">Show more &#8595;</button>':'')+
    '</div>';
  }

  // Topics
  const topicsHtml=(s.topics||[]).length?
    '<div class="topics-section"><h2>Topics</h2><div class="tags">'+
    (s.topics||[]).map(t=>'<span class="tag"><a href="/fellowshipchurch?search='+encodeURIComponent(t)+'">'+esc(t)+'</a></span>').join('')+
    '</div></div>':'';

  document.getElementById('content').innerHTML=
    '<section class="sermon-hero">'+
      '<div class="sermon-hero__date">'+fmt(s.date)+'</div>'+
      (s.scripture?'<div class="sermon-hero__scripture">'+esc(s.scripture)+'</div>':'')+
      '<div class="sermon-hero__title">'+esc(s.title)+'</div>'+
      '<div class="sermon-hero__meta">'+esc(s.speaker||'')+(s.series?' &middot; '+esc(s.series):'')+'</div>'+
      seriesTag+
      '<div class="btn-row">'+ytBtn+guideBtn+'</div>'+
    '</section>'+
    officialSummaryHtml+
    studyGuideTextHtml+
    topicsHtml+
    descHtml;

  document.title=(s.scripture||s.title)+(s.speaker?' — '+s.speaker:'')+' — Fellowship Archive';
}

window.toggleDesc=function(id,btn){
  const el=document.getElementById(id);
  if(el.classList.contains('collapsed')){
    el.classList.remove('collapsed');
    btn.textContent='Show less \u2191';
  }else{
    el.classList.add('collapsed');
    btn.textContent='Show more \u2193';
  }
};

async function load(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){document.getElementById('content').innerHTML='<div class="loading">No sermon ID.</div>';return;}
  try{
    const r=await fetch('/api/fellowshipchurch-sermon?id='+encodeURIComponent(id));
    const s=await r.json();
    if(s.error)throw new Error(s.error);
    render(s);
  }catch(e){
    document.getElementById('content').innerHTML='<div class="loading">Could not load: '+esc(e.message)+'</div>';
  }
}
load();
</script>
</body>
</html>
