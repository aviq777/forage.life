<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sermon — moved</title>
  <link rel="canonical" href="https://forage.life/fellowship">
  <meta name="robots" content="noindex">
  <style>
    body{background:#08101e;color:#8b9db5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:24px;text-align:center}
    a{color:#a5b4fc;text-decoration:none}
    a:hover{color:#fff}
    .box{max-width:500px}
    h1{font-size:18px;font-weight:600;color:#e2e8f0;margin:0 0 10px}
    p{font-size:14px;line-height:1.6;margin:0 0 14px}
    .spinner{width:20px;height:20px;border:2px solid #1e2940;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;margin:14px auto 0}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="box">
    <h1>This sermon view moved.</h1>
    <p>The official archive and the Forage AI analysis are merged at <a href="/fellowship">forage.life/fellowship</a>.</p>
    <p>Looking it up&hellip;</p>
    <div class="spinner"></div>
  </div>
<script>
(async function(){
  const params = new URLSearchParams(location.search);
  const oid = params.get('id');
  // No id → just go to the library.
  if(!oid){ location.replace('/fellowship'); return; }
  try{
    const r = await fetch('/api/sermon-merged?oid=' + encodeURIComponent(oid));
    const d = await r.json();
    const fid = d && d.fellowship && d.fellowship.id;
    if(fid){ location.replace('/fellowship/sermon?id=' + encodeURIComponent(fid)); return; }
    // No matching Forage record — pass the oid through so the merged page can
    // still render the official side.
    location.replace('/fellowship/sermon?oid=' + encodeURIComponent(oid));
  }catch(e){
    location.replace('/fellowship/sermon?oid=' + encodeURIComponent(oid));
  }
})();
</script>
</body>
</html>
