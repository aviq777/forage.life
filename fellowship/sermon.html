<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sermon — Fellowship Library</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#08101e;--card:#0d1525;--card-h:#111e32;
      --border:#1e2940;--border-h:#2e3f60;
      --text:#e2e8f0;--muted:#64748b;--dim:#8b9db5;
      --accent:#6366f1;--purple:#8b5cf6;
      --tag-bg:rgba(99,102,241,.1);--tag:#a5b4fc;--tag-b:rgba(99,102,241,.25);
      --r:12px;
    }
    html{font-size:16px}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:860px;margin:0 auto;padding:0 24px}

    .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:36px}
    .topbar__back{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:13px;transition:color .15s}
    .topbar__back:hover{color:var(--text)}
    .topbar__back svg{width:14px;height:14px}
    .topbar__right a{font-size:12px;color:var(--muted);padding:5px 12px;border:1px solid var(--border);border-radius:20px;transition:all .15s}
    .topbar__right a:hover{border-color:var(--accent);color:var(--tag)}

    /* Hero */
    .sermon-hero{margin-bottom:28px}
    .sermon-hero__date{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .sermon-hero__passage{font-size:clamp(22px,4vw,36px);font-weight:700;color:var(--tag);margin-bottom:8px;line-height:1.1}
    .sermon-hero__title{font-size:clamp(16px,2.5vw,22px);font-weight:600;color:#fff;margin-bottom:10px;line-height:1.3}
    .sermon-hero__meta{font-size:14px;color:var(--muted);margin-bottom:20px}
    .yt-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);border-radius:var(--r);color:#ff7070;font-size:13px;transition:all .15s}
    .yt-btn:hover{background:rgba(255,68,68,.18);border-color:rgba(255,68,68,.5);color:#ff9090}
    .yt-btn svg{width:16px;height:16px}

    /* Pending banner */
    .pending{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;color:var(--muted);margin:20px 0}
    .pending strong{color:var(--dim);display:block;margin-bottom:4px}

    /* Key quote */
    .key-quote{background:var(--card);border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:18px 22px;margin:28px 0;font-size:16px;line-height:1.6;color:var(--text);font-style:italic}
    .key-quote::before{content:'\201C';font-size:44px;line-height:0;vertical-align:-16px;color:var(--accent);margin-right:3px;font-style:normal}

    /* Summary */
    .summary-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:20px}
    .summary-box h2{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
    .summary-box p{font-size:15px;color:var(--dim);line-height:1.7}

    /* Analysis grid */
    .analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
    .field{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
    .field--full{grid-column:1/-1}
    .field__label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:7px}
    .field__value{font-size:13px;color:var(--dim);line-height:1.6}
    .field__value--strong{color:var(--text);font-size:14px}

    /* Topics */
    .topics-section{margin-bottom:28px}
    .topics-section h2{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
    .tags{display:flex;flex-wrap:wrap;gap:8px}
    .tag{padding:5px 12px;background:var(--tag-bg);border:1px solid var(--tag-b);border-radius:20px;font-size:13px;color:var(--tag)}

    /* Loading */
    .loading{display:flex;align-items:center;justify-content:center;padding:100px 0;color:var(--muted)}
    .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Footer */
    .footer{margin-top:48px;padding:22px 0;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:13px;flex-wrap:wrap;gap:12px}
    .footer a{color:var(--muted);transition:color .15s}
    .footer a:hover{color:var(--text)}

    @media(max-width:640px){.analysis-grid{grid-template-columns:1fr}.field--full{grid-column:1}}
  </style>
</head>
<body>
<div class="wrap">
  <nav class="topbar">
    <a href="/fellowship" class="topbar__back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Sermon Library
    </a>
    <div class="topbar__right"><a href="/fellowship#ask">Ask Fellowship</a></div>
  </nav>

  <div id="content"><div class="loading"><div class="spinner"></div>Loading...</div></div>

  <footer class="footer">
    <span>&copy; 2025 forage.life &mdash; Personal study project</span>
    <a href="/fellowship">&#8592; Back to library</a>
  </footer>
</div>
<script>
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(d){if(!d)return'';const[y,m,dd]=d.split('-');return new Date(+y,+m-1,+dd).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}

function field(label,value,full,strong){
  if(!value||value.startsWith('Transcript unavailable'))return'';
  return'<div class="field'+(full?' field--full':'')+'">'+
    '<div class="field__label">'+label+'</div>'+
    '<div class="field__value'+(strong?' field__value--strong':'')+'">'+esc(value)+'</div>'+
  '</div>';
}

function render(s){
  const hasAnalysis=!!(s.summary&&!s.summary.startsWith('Transcript'));
  const isPending=!hasAnalysis;

  const yt=s.youtubeUrl?'<a class="yt-btn" href="'+esc(s.youtubeUrl)+'" target="_blank" rel="noopener">'+
    '<svg viewBox="0 0 24 24" fill="#ff4444"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>'+
    'Watch on YouTube</a>':'';

  const quote=s.keyQuote?'<blockquote class="key-quote">'+esc(s.keyQuote)+'</blockquote>':'';
  const summary=hasAnalysis&&s.summary?'<div class="summary-box"><h2>Summary</h2><p>'+esc(s.summary)+'</p></div>':'';
  const pending=isPending?'<div class="pending"><strong>Analysis in progress</strong>This sermon is in the queue for AI analysis and will be fully annotated soon.</div>':'';
  const topics=(s.topics||[]).length?'<div class="topics-section"><h2>Topics</h2><div class="tags">'+(s.topics.map(t=>'<span class="tag">'+esc(t)+'</span>').join(''))+'</div></div>':'';

  document.getElementById('content').innerHTML=
    '<section class="sermon-hero">'+
      '<div class="sermon-hero__date">'+fmt(s.date)+'</div>'+
      '<div class="sermon-hero__passage">'+esc(s.passage||s.series||'')+'</div>'+
      '<div class="sermon-hero__title">'+esc(s.title)+'</div>'+
      '<div class="sermon-hero__meta">'+esc(s.preacher||'')+(s.series?' &middot; '+esc(s.series):'')+'</div>'+
      yt+
    '</section>'+
    pending+quote+summary+
    '<div class="analysis-grid">'+
      field('Core Problem',s.coreProblem,false,true)+
      field('Core Solution',s.coreSolution,false,true)+
      field('Nature of God',s.natureOfGod,true)+
      field('Sin / Fear / False Belief',s.sinFearFalseBelief,true)+
      field('Call to Action',s.callToAction,true)+
      field('Promise from God',s.promise)+
      field('Core Tension',s.coreTension)+
      field('Greek / Hebrew Words',s.greekHebrew,true)+
      field('Series Connection',s.seriesConnection,true)+
      field('Cross-Reference Themes',s.crossReferenceThemes,true)+
      field('Books of Bible Referenced',s.booksOfBible)+
    '</div>'+topics;

  document.title=(s.passage||s.title)+(s.preacher?' — '+s.preacher:'')+' — Fellowship Library';
}

async function load(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){document.getElementById('content').innerHTML='<div class="loading">No sermon ID.</div>';return;}
  try{
    const r=await fetch('/api/sermon?id='+encodeURIComponent(id));
    const s=await r.json();
    if(s.error)throw new Error(s.error);
    render(s);
  }catch(e){
    document.getElementById('content').innerHTML='<div class="loading">Could not load: '+esc(e.message)+'</div>';
  }
}
load();
</script>
</body>
</html>
